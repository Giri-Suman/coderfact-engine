name: 1. Morning Topic Researcher

on:
  schedule:
    - cron: '30 2 * * *'  # 8:00 AM IST (UTC+5:30)
  workflow_dispatch:       # Manual trigger for testing

# Prevent two research runs overlapping
concurrency:
  group: morning-research
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # Kill if stuck — AI calls can hang
    permissions:
      contents: write       # Required to commit state.json back to repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1    # Shallow clone — faster

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'      # Cache pip packages across runs (~20s saved)

      - name: Install dependencies
        run: pip install --quiet requests feedparser beautifulsoup4 pytrends

      - name: Run Morning Researcher
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python agent.py research