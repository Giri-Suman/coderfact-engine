name: 1. Morning Topic Researcher

on:
  schedule:
    - cron: '30 2 * * *'  # 8:00 AM IST (UTC+5:30)
  workflow_dispatch:       # Manual trigger for testing

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit state.json back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: Run Morning Researcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python agent.py research