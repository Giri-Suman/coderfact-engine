name: 2. Telegram Listener & Drafter

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 min — catches your reply within 15 min
  workflow_dispatch:         # Manual trigger for testing

# Critical: prevent two drafts running simultaneously on same reply
concurrency:
  group: telegram-draft
  cancel-in-progress: false  # Don't cancel — let the current draft finish

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20      # Article generation can take ~5 min per article
    permissions:
      contents: write        # Required to commit state.json (update_id tracking)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        # pytrends NOT needed here — only for research phase
        run: pip install --quiet requests feedparser beautifulsoup4

      - name: Check Telegram & Draft Article
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY:       ${{ secrets.DEVTO_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python agent.py draft