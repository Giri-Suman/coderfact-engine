name: 2. Telegram Listener & Drafter

on:
  schedule:
    - cron: '0 * * * *'  # Every hour — checks if you replied
  workflow_dispatch:      # Manual trigger for testing

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to commit state.json (update_id tracking)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4

      - name: Check Telegram & Draft Article
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY:      ${{ secrets.DEVTO_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
        run: python agent.py draft