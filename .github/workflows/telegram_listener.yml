name: 2. Telegram Listener & Drafter

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 min
  workflow_dispatch:

concurrency:
  group: telegram-draft
  cancel-in-progress: false  # Let current draft finish — don't cancel

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write         # Needed to save medium_drafts/*.md to repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet requests feedparser beautifulsoup4

      - name: Check Telegram & Draft Article
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          DEVTO_API_KEY:       ${{ secrets.DEVTO_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          # Persona — override via GitHub Actions Variables (Settings → Variables)
          AUTHOR_NAME:         ${{ vars.AUTHOR_NAME || 'Suman Giri' }}
          AUTHOR_CONTEXT:      ${{ vars.AUTHOR_CONTEXT || 'a tech automation enthusiast, senior frontend developer from Kolkata who builds tools for CoderFact' }}
          AUTHOR_VIBE:         ${{ vars.AUTHOR_VIBE || 'figures stuff out at 1am, writes about it next morning, still mildly annoyed it took so long' }}
        run: python agent.py draft